include-file = colors.ini

[bar/jrs]
monitor = ${env:MONITOR:}
width = 100%
height = 25pt
radius = 0
cursor-click = pointer
border-top-size = 0pt 
border-left-size = 0pt 
border-right-size = 0pt 
border-bottom-size = 0pt
border-color = #00000000
module-margin = 1
line-size = 2.5pt
pin-workspaces = true
background = ${colors.base01}
foreground = ${colors.base02}
bottom = false
padding-left = 1
padding-right = 1
separator =
separator-foreground = ${colors.base00}
wm-restack = i3
font-0 = "Caskaydia Mono Nerd Font:style=regular:size=9;2"
font-1 = "Caskaydia Mono Nerd Font:style=regular:size=11;2"
modules-left = xworkspaces
modules-center = date
modules-right = tray tray_button battery bluetooth network pulseaudio
enable-ipc = true

[module/tray_button]
type = custom/text
format = "’ää  "
format-font = 1
click-left = polybar-msg action tray module_toggle

[module/tray]
type = internal/tray
format-margin = 10px
tray-spacing = 10px
tray-size = 50%
tray-scale = 1
hidden = true

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = false
label-mode = %mode%
label-mode-padding = 2
label-mode-background = ${colors.base04}
label-focused = %name%
label-focused-background = ${colors.background}
label-focused-underline = ${colors.primary}
label-focused-padding = 2
label-unfocused = %index%: %name%
label-unfocused-padding = 2
label-urgent = %index%: %name%
label-urgent-background = ${colors.base04}
label-urgent-padding = 2

[module/xworkspaces]
type = internal/xworkspaces
icon-0 = 1;1
icon-1 = 2;2
icon-2 = 3;3
icon-3 = 4;4
icon-4 = 5;5
icon-5 = 6;6
icon-6 = 7;7
icon-7 = 8;8
icon-8 = 9;9
icon-9 = 10;0
icon-default = ŌÖ¤
label-active = ¾▒ō╗
label-active-background = ${colors.base01}
label-active-underline = 
label-active-padding = 2
label-occupied = %icon%
label-occupied-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.base04}
label-urgent-padding = 2
label-empty =
label-empty-foreground = ${colors.base05}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = " %title:0:60:...%"

[module/xkeyboard]
type = internal/xkeyboard
format-spacing = 0
label-layout =
label-indicator = [%name%]
label-layout-foreground = ${colors.base02}
label-indicator-padding = 0
label-indicator-margin = 0
label-indicator-foreground = ${colors.base02}
label-indicator-background = ${colors.base01}

[module/date]
type = internal/date
interval = 5
date-alt = %A %I:%M %p
date = %a.%d %b %I:%M %p
datebkp = %H:%M:%S
label = %date%
label-foreground = ${colors.base02}

[module/battery]
hidden = false
type = internal/battery
format-charging-font = 2
format-discharging-font = 2
label-full-font = 2
label-low-font = 2
full-at = 99
low-at = 5
battery = BAT1
adapter = ADP1
poll-interval = 5
time-format = %H:%M
format-charging = <animation-charging>
format-discharging = <ramp-capacity>
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = " ¾░ü╣ "
label-low = " ¾░ü║ "
ramp-capacity-0 = " ¾░ü║ "
ramp-capacity-1 = " ¾░ü╝ "
ramp-capacity-2 = " ¾░üŠ "
ramp-capacity-3 = " ¾░éĆ "
ramp-capacity-4 = " ¾░ü╣ "
bar-capacity-width = 10
animation-charging-0 = " ¾░ó£ "
animation-charging-1 = " ¾░éć "
animation-charging-2 = " ¾░éē "
animation-charging-3 = " ¾░éŖ "
animation-charging-4 = " ¾░éģ "
animation-charging-framerate = 750
animation-discharging-0 = " ¾░ü║ "
animation-discharging-1 = " ¾░ü╝ "
animation-discharging-2 = " ¾░üŠ "
animation-discharging-3 = " ¾░éĆ "
animation-discharging-4 = " ¾░ü╣ "
animation-discharging-framerate = 500
animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200

[module/pulseaudio]
hidden = false
type = internal/pulseaudio
use-ui-max = true
interval = 5
reverse-scroll = false
format-volume-font = 1
format-volume = <ramp-volume> 
label-muted = "Ņ╗© "
ramp-volume-0 = "’Ć” "
ramp-volume-1 = "’Ć¦ "
ramp-volume-2 = "’Ć© "
click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
click-right = $TERMINAL --class=Wiremix -e wiremix --tab output

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth.sh
interval = 3
click-right = $TERMINAL -e bluetui

[module/network]
type = custom/script
exec = ~/.config/polybar/scripts/network.sh
interval = 3
click-right = alacritty -e impala 
click-middle = alacritty -e nmtui

[settings]
screenchange-reload = true
pseudo-transparency = false

